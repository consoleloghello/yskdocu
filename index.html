<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="公用工程题库 — 化工企业公用工程岗位考试刷题应用，涵盖火炬、罐区、锅炉等9大系统">
<title>公用工程题库</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<noscript><div style="text-align:center;padding:40px;font-size:16px;color:#666;">请启用 JavaScript 以使用刷题功能</div></noscript>
<div id="app">
  <!-- Entry Overlay -->
  <div id="entryOverlay">
    <div class="overlay-bg"></div>
    <div class="overlay-content">
      <div class="overlay-title">
        <div class="overlay-icon">📘</div>
        <h1>公用工程题库</h1>
        <p>请选择版本进入</p>
      </div>
      <div class="overlay-cards">
        <div class="overlay-card" data-ver="外操版">
          <div class="card-icon">🔧</div>
          <h2>外操版</h2>
          <p>适用于现场操作人员</p>
          <span class="card-btn">进入</span>
        </div>
        <div class="overlay-card" data-ver="内操版">
          <div class="card-icon">🖥️</div>
          <h2>内操版</h2>
          <p>适用于中控操作人员</p>
          <span class="card-btn">进入</span>
        </div>
      </div>
    </div>
  </div>
  <!-- Header -->
  <header id="header">
    <div class="header-inner">
      <h1 class="logo">📁 公用工程题库</h1>
      <div class="header-right">
        <button id="loginBtn" class="auth-login-btn" title="登录/注册">🔐 登录</button>
        <span id="userInfo" class="auth-user-info" style="display:none">
          <span id="userName" class="auth-user-name"></span>
          <button id="logoutBtn" class="auth-logout-btn">登出</button>
        </span>
        <button id="statsBtn" class="icon-btn" title="统计">📊</button>
        <div class="version-switch">
          <button id="verWaic" class="ver-btn active">外操版</button>
          <button id="verNei" class="ver-btn">内操版</button>
        </div>
      </div>
    </div>
  </header>

  <!-- Search -->
  <div id="searchBar">
    <input id="searchInput" type="search" placeholder="搜索题目或关键字..." autocomplete="off">
    <button id="searchClear" class="icon-btn" style="display:none">✕</button>
  </div>

  <!-- Chapter Nav -->
  <nav id="chapterNav">
    <div id="chapterList"></div>
    <div id="typeFilters" style="display:none">
      <button class="type-btn active" data-type="all">全部</button>
      <button class="type-btn" data-type="选择题">选择</button>
      <button class="type-btn" data-type="填空题">填空</button>
      <button class="type-btn" data-type="判断题">判断</button>
      <button class="type-btn" data-type="简答题">简答</button>
      <button class="type-btn" data-type="实操分析题">实操</button>
      <button class="type-btn" data-type="应急处理题">应急</button>
    </div>
  </nav>

  <!-- Main Card Area -->
  <main id="mainContent">
    <div id="topActions" style="display:none">
      <button id="wrongBookBtn" class="action-btn" title="错题本">❌ 错题 (0)</button>

      <button id="revealAllBtn" class="action-btn">👁 全部显示</button>
      <button id="hideAllBtn" class="action-btn" style="display:none">🙈 全部隐藏</button>
    </div>
    <div id="welcome">
      <div class="welcome-icon">📖</div>
      <h2>选择章节开始刷题</h2>
      <p id="welcomeStats">加载中...</p>
    </div>
    <div id="questionList" style="display:none"></div>
  </main>
</div>

<!-- Stats Modal -->
<div id="statsModal" class="modal" style="display:none">
  <div class="modal-content">
    <span id="statsClose" class="modal-close">✕</span>
    <h2>📊 学习统计</h2>
    <div id="statsBody"></div>
  </div>
</div>

<!-- Login / Register Modal -->
<div id="loginModal" class="modal" style="display:none">
  <div class="modal-content login-modal-content">
    <h2 id="authTitle">🔐 登录</h2>
    <div class="login-form">
      <input id="loginEmail" type="email" placeholder="邮箱地址" autocomplete="email">
      <input id="loginPassword" type="password" placeholder="密码" autocomplete="current-password">
      <input id="regNickname" type="text" placeholder="昵称（选填）" autocomplete="name" style="display:none">
      <p id="loginError" class="login-error"></p>
      <button id="loginSubmit" class="login-submit-btn">登录</button>
      <p class="auth-toggle-text"><a id="authToggle" href="#">没有账号？<span id="authToggleText">注册</span></a></p>
      <button id="loginCancel" class="login-cancel-btn">取消</button>
    </div>
  </div>
</div>

<!-- Note Modal -->
<div id="noteModal" class="modal" style="display:none">
  <div class="modal-content">
    <span id="noteClose" class="modal-close">✕</span>
    <h2>📝 题目笔记</h2>
    <textarea id="noteTextarea" class="note-textarea" placeholder="写下对这道题的笔记..."></textarea>
    <div class="note-actions">
      <button id="noteSaveBtn" class="note-save-btn">💾 保存</button>
      <button id="noteDeleteBtn" class="note-delete-btn">🗑 删除</button>
      <button id="noteCancel" class="note-cancel-btn">取消</button>
    </div>
  </div>
</div>

<!-- Report Modal -->
<div id="reportModal" class="modal" style="display:none">
  <div class="modal-content">
    <span id="reportClose" class="modal-close">✕</span>
    <h2>🐛 题目纠错反馈</h2>
    <div class="report-form">
      <p class="report-label">报错原因：</p>
      <label class="report-option"><input type="radio" name="reportReason" value="答案有误"> 答案有误</label>
      <label class="report-option"><input type="radio" name="reportReason" value="题目描述不清"> 题目描述不清</label>
      <label class="report-option"><input type="radio" name="reportReason" value="选项缺失或错误"> 选项缺失或错误</label>
      <label class="report-option"><input type="radio" name="reportReason" value="其他"> 其他</label>
      <textarea id="reportDetail" class="report-textarea" placeholder="补充说明（选填）..."></textarea>
      <p id="reportMsg" class="report-msg"></p>
      <div class="report-actions">
        <button id="reportSubmit" class="report-submit-btn">提交</button>
        <button id="reportCancel" class="report-cancel-btn">取消</button>
      </div>
    </div>
  </div>
</div>

<!-- Changelog Modal -->
<div id="changelogModal" class="modal" style="display:none">
  <div class="modal-content">
    <span id="changelogClose" class="modal-close">✕</span>
    <h2>📢 更新公告</h2>
    <div id="changelogBody">
      <p style="text-align:center;color:var(--text2);padding:20px 0">加载中...</p>
    </div>
  </div>
</div>

<!-- CDN: Supabase SDK + Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<!-- App scripts -->
<script src="js/supabase.js"></script>
<script src="js/sync.js"></script>
<script src="js/app.js?v=2"></script>
</body>
</html>
